# M02 — truthful CI skeleton. Actions pinned to full SHAs (tags noted in comments).
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-safety:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install pinned dev tools
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Verify repository state
        run: python scripts/verify_repo_state.py

      - name: Ruff (support scripts)
        run: ruff check scripts --output-format json > artifacts/ruff.json

      - name: Compile support scripts
        run: python -m compileall -q scripts && echo ok > artifacts/compileall_ok.txt

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: m02-ci-artifacts
          path: artifacts/
