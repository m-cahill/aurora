# M03 — truthful governance CI. External Actions pinned to full SHAs (tags noted in comments).
name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repo-safety:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Install pinned dev tools
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Verify repository state
        run: python scripts/verify_repo_state.py

      - name: Ruff (scripts, tests, and runtime src)
        run: ruff check scripts tests src --output-format json > artifacts/ruff.json

      - name: Compile scripts, tests, and runtime src
        run: python -m compileall -q scripts tests src && echo ok > artifacts/compileall_ok.txt

      - name: Mypy (strict; first-party src/aurora)
        run: mypy src/aurora

      - name: Tests with coverage (unittest; first-party src/aurora)
        env:
          PYTHONPATH: src
        run: |
          coverage run -m unittest discover -s tests -v 2>&1 | tee artifacts/unittest.txt
          coverage report
          coverage json -o artifacts/coverage.json
          python scripts/check_coverage_thresholds.py

      - name: Dependency vulnerability audit (pip-audit; full environment)
        run: pip-audit

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ci-artifacts
          path: artifacts/
